kind = "web"
previewPath = "/"
title = "RunRoute - Smart Running Route Planner"
version = "1.0.0"
id = "artifacts/route-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23185
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/route-planner run dev"

[services.env]
PORT = "23185"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/route-planner", "run", "build"]
publicDir = "artifacts/route-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
